<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'qituvchini Tahrirlash</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="edit-teacher-shell">
    <section class="edit-teacher-page">
        <div class="edit-teacher-topbar">
            <div>
                <p class="eyebrow">Kafedra mudiri paneli</p>
                <h1>O'qituvchi ma'lumotlarini tahrirlash</h1>
            </div>
            <a class="edit-back-button" th:href="@{/teachers}">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M15.5 5 8.5 12l7 7-1.5 1.5L5.5 12 14 3.5 15.5 5z"/>
                </svg>
                <span>Orqaga</span>
            </a>
        </div>

        <section class="edit-teacher-card">
            <form class="edit-teacher-form" th:action="@{/teachers/{id}/edit(id=${editTeacher.id})}" th:object="${teacherEditForm}" method="post">
                <div class="edit-field wide">
                    <label for="fullName">F.I.Sh (To'liq ism-sharifi)</label>
                    <div class="edit-input-wrap">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9zm0 2c-4.3 0-8 2.2-8 5v2h16v-2c0-2.8-3.7-5-8-5z"/>
                        </svg>
                        <input id="fullName" type="text" th:field="*{fullName}">
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
                </div>

                <div class="edit-field-row">
                    <div class="edit-field">
                        <label for="department">Kafedra</label>
                        <div class="edit-input-wrap">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M4 21V7l8-4 8 4v14h-6v-6h-4v6H4zm2-2h2v-6h8v6h2V8.2l-6-3-6 3V19z"/>
                            </svg>
                            <input id="department" type="text" th:field="*{department}">
                        </div>
                        <p class="field-error" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></p>
                    </div>
                    <div class="edit-field">
                        <label for="position">Lavozim</label>
                        <div class="edit-input-wrap">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M9 4h6l1 3h4v13H4V7h4l1-3zm1.5 3h3L13 6h-2l-.5 1zM6 9v9h12V9H6z"/>
                            </svg>
                            <input id="position" type="text" th:field="*{position}">
                        </div>
                        <p class="field-error" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></p>
                    </div>
                    <div class="edit-field">
                        <label for="phoneNumber">Telefon raqami</label>
                        <div class="edit-input-wrap">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v16h10V4H7zm4 13h2v2h-2v-2z"/>
                            </svg>
                            <input id="phoneNumber" type="text" th:field="*{phoneNumber}">
                        </div>
                        <p class="field-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
                    </div>
                </div>

                <div class="edit-field-row login-row">
                    <div class="edit-field">
                        <label for="username">Login</label>
                        <div class="edit-input-wrap">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M4 5h16v14H4V5zm2 2v.5l6 4 6-4V7H6zm12 10V9.9l-6 4-6-4V17h12z"/>
                            </svg>
                            <input id="username" type="text" th:field="*{username}">
                        </div>
                        <p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                    </div>
                    <div class="edit-field">
                        <label for="password">Yangi parol (ixtiyoriy)</label>
                        <div class="edit-input-wrap">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M7 10V8a5 5 0 0 1 10 0v2h2v11H5V10h2zm2 0h6V8a3 3 0 0 0-6 0v2zm2 4v3h2v-3h-2z"/>
                            </svg>
                            <input id="password" type="password" th:field="*{password}" placeholder="Bo'sh qoldirilsa o'zgarmaydi" minlength="10">
                            <button type="button" class="login-password-toggle edit-password-toggle" data-toggle-password="password" aria-label="Parolni ko'rsatish" title="Parolni ko'rsatish">
                                <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 5c5 0 9 4.5 10 7-1 2.5-5 7-10 7S3 14.5 2 12c1-2.5 5-7 10-7zm0 2c-3.4 0-6.3 2.7-7.7 5 1.4 2.3 4.3 5 7.7 5s6.3-2.7 7.7-5C18.3 9.7 15.4 7 12 7zm0 2.5A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5z"/>
                                </svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="m3.3 2 18.7 18.7-1.3 1.3-3.1-3.1A10.5 10.5 0 0 1 12 21C7 21 3 16.5 2 14c.5-1.3 1.9-3.1 3.8-4.5L2 5.3 3.3 2zm7 7 1.5 1.5A2.5 2.5 0 0 1 15.5 14l1 1A4.5 4.5 0 0 0 10.3 9zM12 7c5 0 9 4.5 10 7-.3.8-1.1 1.9-2.2 3L17 14.2V14a5 5 0 0 0-5-5h-.2L9.7 6.9A10.7 10.7 0 0 1 12 7z"/>
                                </svg>
                            </button>
                        </div>
                        <p class="security-hidden-note">Parol o'zgartirilsa, kamida 10 ta belgidan iborat kuchli parol kiriting.</p>
                        <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>
                </div>

                <div class="edit-form-actions">
                    <button type="submit" class="edit-save-button">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5 3h12l2 2v16H5V3zm2 2v14h10V7.8L16.2 7H15v5H8V5H7zm3 0v5h3V5h-3zm0 10h6v2h-6v-2z"/>
                        </svg>
                        <span>O'zgarishlarni saqlash</span>
                    </button>
                    <a class="edit-cancel-button" th:href="@{/teachers}">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6z"/>
                        </svg>
                        <span>Bekor qilish</span>
                    </a>
                </div>
            </form>
        </section>
    </section>
</main>
<script>
    document.querySelectorAll('[data-toggle-password]').forEach((button) => {
        button.addEventListener('click', () => {
            const input = document.getElementById(button.dataset.togglePassword);
            if (!input) {
                return;
            }
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            button.classList.toggle('is-visible', isPassword);
            button.setAttribute('aria-label', isPassword ? 'Parolni yashirish' : 'Parolni ko\'rsatish');
        });
    });
</script>
</body>
</html>
